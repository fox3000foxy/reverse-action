name: debug-runner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install tmate + filesystem watcher
        run: |
          sudo apt-get update
          sudo apt-get install -y tmate inotify-tools

      - name: Start tmate session + autosave to tag "filesystem"
        run: |
          bash .github/scripts/start-tmate.sh