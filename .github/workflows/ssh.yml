name: debug-runner

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.apt-cache/archives
            ${{ github.workspace }}/.apt-cache/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('/etc/apt/sources.list', '/etc/apt/sources.list.d/**/*.list') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install tmate + filesystem watcher
        run: |
          bash .github/scripts/install-deps.sh

      - name: Start tmate session + autosave to tag "filesystem"
        run: |
          bash .github/scripts/start-tmate.sh