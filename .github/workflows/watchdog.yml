name: watchdog

on:
  workflow_run:
    workflows:
      - debug-runner
    types:
      - completed

permissions:
  contents: write

jobs:
  restart:
    # Only restart if the previous run failed or timed out
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'timed_out' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger debug-runner again
        run: |
          echo "Triggering debug-runner again (previous conclusion: ${{ github.event.workflow_run.conclusion }})"
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/ssh.yml/dispatches \
            -d '{"ref":"${{ github.event.workflow_run.head_branch }}"}'
